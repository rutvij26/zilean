name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: input
    id: lol-version
    attributes:
      label: League of Legends version
      placeholder: "e.g. 14.10"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Windows 11 Home 23H2"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start a game
        2. Press Alt+C
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant console output or attach screenshots
